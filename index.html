<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronúncias – Primeiro Inglês Divertido</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow:      #fbbf24;
    --yellow-dark: #e6a800;
    --blue:        #004ecd;
    --blue-light:  #a4c6ff;
    --blue-pale:   #deeaff;
    --white:       #ffffff;
    --text:        #1a2a4a;
    --muted:       #6b7a99;
    --page-bg:     #eef4ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--page-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--blue);
    position: relative;
    overflow: hidden;
    padding: 40px 24px 72px;
    text-align: center;
  }
  header::before, header::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    opacity: 0.13;
  }
  header::before {
    width: 340px; height: 340px;
    background: var(--blue-light);
    top: -120px; left: -90px;
  }
  header::after {
    width: 220px; height: 220px;
    background: var(--yellow);
    bottom: -70px; right: -50px;
  }

  .header-inner {
    position: relative;
    z-index: 2;
    max-width: 680px;
    margin: 0 auto;
  }

  .brand-badge {
    display: inline-block;
    background: var(--yellow);
    color: var(--blue);
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 18px;
    border-radius: 50px;
    margin-bottom: 16px;
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  header h1 span { color: var(--yellow); }

  header p {
    color: var(--blue-light);
    font-size: 1rem;
    font-weight: 500;
  }

  .wave svg { display: block; width: 100%; }
  .wave path { fill: var(--page-bg); }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 540px;
    margin: -20px auto 28px;
    padding: 0 20px;
    position: relative;
    z-index: 10;
  }
  .search-wrap input {
    width: 100%;
    padding: 14px 20px 14px 50px;
    border: 2.5px solid var(--blue-light);
    border-radius: 50px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    background: var(--white);
    box-shadow: 0 6px 24px rgba(0,78,205,0.12);
    outline: none;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 6px 24px rgba(0,78,205,0.22);
  }
  .search-wrap input::placeholder { color: var(--blue-light); }
  .search-icon {
    position: absolute;
    left: 36px; top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 16px;
    margin-bottom: 28px;
  }
  .tab {
    padding: 8px 18px;
    border-radius: 50px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    border: 2px solid var(--blue-light);
    background: var(--white);
    color: var(--blue);
    transition: all 0.18s;
    box-shadow: 0 2px 8px rgba(0,78,205,0.07);
  }
  .tab:hover { background: var(--blue-pale); border-color: var(--blue); }
  .tab.active {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
    box-shadow: 0 4px 14px rgba(0,78,205,0.3);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(278px, 1fr));
    gap: 18px;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 18px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 4px 20px rgba(0,78,205,0.09);
    display: flex;
    align-items: center;
    gap: 14px;
    border: 2px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: popIn 0.4s cubic-bezier(.26,1.4,.46,1) both;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,78,205,0.15);
    border-color: var(--blue-light);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* emoji */
  .emoji-circle {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--blue-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    border: 2px solid var(--blue-light);
  }

  /* texto central */
  .card-info {
    flex: 1;
    min-width: 0;
  }
  .card-word {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--blue);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .translation {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 1px;
  }

  /* botão play */
  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--yellow);
    border: none;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--blue);
    font-weight: 700;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(251,191,36,0.45);
    transition: transform 0.15s, background 0.15s;
  }
  .play-btn:hover { transform: scale(1.12); background: var(--yellow-dark); }
  .play-btn:active { transform: scale(0.95); }

  /* ── EMPTY ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty span { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 48px;
    padding: 0 20px;
  }
  .footer p {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    color: var(--blue);
    font-weight: 700;
  }
  .footer small {
    font-size: 0.78rem;
    color: var(--muted);
  }
</style>
</head>

<!-- HEADER -->
<header>

const catLabels = {
  colors:'Colors', family:'Family', fruits:'Fruits', animals:'Animals', numbers:'Numbers'
};

let activeTab = 'all';
let searchText = '';
const audioCache = {};
let currentId = null;

function render() {
  const grid = document.getElementById('grid');
  const list = words.filter(w => {
    const matchTab  = activeTab === 'all' || w.cat === activeTab;
    const matchText = w.word.toLowerCase().includes(searchText) ||
                      w.translation.toLowerCase().includes(searchText);
    return matchTab && matchText;
  });

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><span>🔍</span>Nenhuma palavra encontrada.</div>`;
    return;
  }

  grid.innerHTML = list.map((w, i) => `
    <div class="card" style="animation-delay:${i * 0.045}s">
      <div class="emoji-circle">${w.emoji}</div>
      <div class="card-info">
        <div class="card-word">${w.word}</div>
        <div class="translation">&#127463;&#127479; ${w.translation}</div>
      </div>
      <button class="play-btn" id="btn-${w.id}" onclick="togglePlay(${w.id},'${esc(w.audioSrc)}')">&#9654;</button>
    </div>
  `).join('');
}

function esc(s){ return (s||'').replace(/'/g,"\\'"); }

function getAudio(id, src) {
  if (!audioCache[id]) {
    if (!src) { alert('Áudio ainda não adicionado para esta palavra.'); return null; }
    const a = new Audio(src);
        a.addEventListener('ended', () => resetPlayer(id));
    audioCache[id] = a;
  }
  return audioCache[id];
}

function togglePlay(id, src) {
  const audio = getAudio(id, src);
  if (!audio) return;
  if (currentId && currentId !== id) stopPlayer(currentId);
  if (audio.paused) {
    audio.play();
    document.getElementById('btn-'+id).textContent = '⏸';
    currentId = id;
  } else {
    audio.pause();
    document.getElementById('btn-'+id).textContent = '▶';
    currentId = null;
  }
}


function stopPlayer(id) {
  const a = audioCache[id];
  if (!a) return;
  a.pause(); a.currentTime = 0;
  resetPlayer(id);
}

function resetPlayer(id) {
  const btn = document.getElementById('btn-'+id);
  if (btn) btn.textContent = '▶';
  currentId = null;
}

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function filterTab(cat, btn) {
  activeTab = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterCards() {
  searchText = document.getElementById('searchInput').value.toLowerCase().trim();
  render();
}

render();
</script>
</body>
</html>
